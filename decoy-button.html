<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do you want to try again?</title>
<style>
  :root{
    --bg: #F2EFE6;
    --ink: #181818;
    --ink-soft: #5b5850;
    --real: #1B5E4F;
    --real-dark: #134539;
    --fake: #E8A33D;
    --fake-dark: #b87a1f;
    --line: #d8d2c2;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Space Grotesk', system-ui, sans-serif;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .wrap {
    width: min(92vw, 760px);
    text-align: center;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 0.9rem;
  }

  h1 {
    font-size: clamp(1.9rem, 5vw, 3.1rem);
    line-height: 1.12;
    margin: 0 0 0.6rem;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .sub {
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-size: 0.95rem;
    color: var(--ink-soft);
    margin: 0 0 3rem;
  }

  .stage {
    position: relative;
    width: 100%;
    height: 220px;
    margin: 0 auto;
  }

  .real-btn {
    position: absolute;
    left: 28%;
    top: 90px;
    transform: translateX(-50%);
    background: var(--real);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 16px 34px;
    font-family: inherit;
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: transform 0.12s ease, background 0.12s ease;
  }
  .real-btn:hover { background: var(--real-dark); transform: translateX(-50%) translateY(-2px); }
  .real-btn:active { transform: translateX(-50%) translateY(0); }
  .real-btn:focus-visible {
    outline: 3px solid var(--real-dark);
    outline-offset: 3px;
  }

  .fake-btn {
    position: absolute;
    left: 72%;
    top: 90px;
    transform: translate(-50%, 0);
    background: var(--fake);
    color: #1a1200;
    border: 2px dashed var(--fake-dark);
    border-radius: 10px;
    padding: 16px 34px;
    font-family: inherit;
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    user-select: none;
    transition: left 0.22s cubic-bezier(.2,.8,.2,1), top 0.22s cubic-bezier(.2,.8,.2,1);
    white-space: nowrap;
  }

  .toast {
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-size: 0.85rem;
    color: var(--real-dark);
    margin-top: 1.6rem;
    min-height: 1.4em;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  .hairline {
    width: 60px;
    height: 1px;
    background: var(--line);
    margin: 2.2rem auto 0;
  }

  @media (prefers-reduced-motion: reduce) {
    .fake-btn { transition: none; }
  }
</style>
</head>
<body>

  <div class="wrap">
    <div class="eyebrow">Status: Beautiful Girl Detected</div>
    <h1>I want to try again, do you?</h1>

    <div class="stage" id="stage">
      <button class="real-btn" id="realBtn">Yes</button>
      <div class="fake-btn" id="fakeBtn" aria-hidden="true">No</div>
    </div>

    <div class="hairline"></div>
    <div class="toast" id="toast"></div>
  </div>

<script>
  const stage = document.getElementById('stage');
  const fakeBtn = document.getElementById('fakeBtn');
  const realBtn = document.getElementById('realBtn');
  const toast = document.getElementById('toast');

  // --- Sound: small WebAudio beep, no external file needed ---
  let audioCtx;
  function beep(freq) {
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.12, audioCtx.currentTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.18);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.2);
    } catch (e) { /* audio not available, ignore */ }
  }

  // --- Dodge behavior ---
  const taunts = ['No', 'nope', 'nice try', 'so close', 'almost', 'not quite'];
  let tauntIndex = 0;

  function dodge() {
    const stageRect = stage.getBoundingClientRect();
    const btnRect = fakeBtn.getBoundingClientRect();
    const maxLeft = stageRect.width - btnRect.width;
    const maxTop = stageRect.height - btnRect.height;

    const newLeft = Math.max(0, Math.min(maxLeft, Math.random() * maxLeft));
    const newTop = Math.max(0, Math.min(maxTop, Math.random() * maxTop));

    fakeBtn.style.left = newLeft + 'px';
    fakeBtn.style.top = newTop + 'px';
    fakeBtn.style.transform = 'none';

    tauntIndex = (tauntIndex + 1) % taunts.length;
    fakeBtn.textContent = taunts[tauntIndex];

    beep(420 + Math.random() * 220);
  }

  fakeBtn.addEventListener('mouseenter', dodge);
  fakeBtn.addEventListener('touchstart', (e) => { e.preventDefault(); dodge(); }, { passive: false });

  // --- Real button: notify on click ---
  function notify() {
    toast.textContent = 'She said yes 🎉';
    toast.classList.add('show');

    if ('Notification' in window) {
      if (Notification.permission === 'granted') {
        new Notification('They said yes!');
      } else if (Notification.permission !== 'denied') {
        Notification.requestPermission().then(p => {
          if (p === 'granted') new Notification('They said yes!');
        });
      }
    }
  }

  realBtn.addEventListener('click', notify);
</script>
</body>
</html>
